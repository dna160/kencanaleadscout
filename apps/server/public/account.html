<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Akun — Kencana LeadScout</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --c-bg: #f5f7fa; --c-card: #fff; --c-border: #e2e8f0;
    --c-text: #1a202c; --c-muted: #718096;
    --c-red: #e53e3e; --c-red-bg: #fff5f5; --c-red-border: #fed7d7;
    --c-blue: #3182ce; --c-blue-bg: #ebf8ff; --c-blue-border: #bee3f8;
    --c-green: #38a169; --c-green-bg: #f0fff4; --c-green-border: #c6f6d5;
    --c-orange: #dd6b20; --c-gold: #b7791f;
    --radius: 8px;
  }
  body { font-family: system-ui, sans-serif; background: var(--c-bg); color: var(--c-text); }

  nav { background: #1a2744; color: #fff; padding: 0 16px; display: flex; align-items: center; gap: 12px; height: 48px; }
  nav .brand { font-weight: 700; font-size: 15px; color: #fff; text-decoration: none; flex-shrink: 0; }
  nav a { color: rgba(255,255,255,.7); text-decoration: none; font-size: 13px; white-space: nowrap; }
  nav a:hover { color: #fff; }
  nav .spacer { flex: 1; }
  nav .back-btn { color: rgba(255,255,255,.7); font-size: 13px; text-decoration: none; }
  nav .back-btn:hover { color: #fff; }

  .page { max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }

  /* Account header card */
  .acct-header { background: var(--c-card); border: 1px solid var(--c-border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; }
  .acct-header .row { display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
  .acct-header .name { font-size: 22px; font-weight: 700; flex: 1; min-width: 200px; }
  .acct-header .meta { font-size: 13px; color: var(--c-muted); margin-top: 6px; }
  .acct-header .meta span { margin-right: 14px; }

  /* Stage badge + changer */
  .stage-area { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  .stage-area label { font-size: 12px; color: var(--c-muted); }
  .stage-area select { font-size: 13px; padding: 4px 8px; border: 1px solid var(--c-border); border-radius: 6px; }
  .stage-area button { font-size: 12px; padding: 5px 14px; background: var(--c-blue); color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  .stage-area button:hover { background: #2b77c4; }
  .stage-area .changed-by { font-size: 12px; color: var(--c-muted); }

  /* Badge */
  .badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 10px; text-transform: uppercase; letter-spacing: .4px; }
  .badge-aktif      { background: #e6fffa; color: #2c7a7b; }
  .badge-perlu      { background: #fffbeb; color: var(--c-gold); }
  .badge-at_risk    { background: var(--c-red-bg); color: var(--c-red); }
  .badge-hibernasi  { background: #e2e8f0; color: #4a5568; }
  .badge-prospek    { background: #ebf4ff; color: #2b6cb0; }
  .badge-penawaran  { background: #faf5ff; color: #6b46c1; }
  .badge-negosiasi  { background: #fffaf0; color: var(--c-orange); }
  .badge-won        { background: var(--c-green-bg); color: var(--c-green); }
  .badge-gugur      { background: #fff5f5; color: #c53030; }

  /* Action bar */
  .action-bar { background: var(--c-card); border: 1px solid var(--c-border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .action-bar h3 { font-size: 13px; font-weight: 700; color: var(--c-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
  .action-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-btns button { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid var(--c-border); background: #fff; }
  .action-btns button:hover { background: var(--c-bg); }
  .action-btns .btn-primary { background: var(--c-blue); color: #fff; border-color: var(--c-blue); }
  .action-btns .btn-primary:hover { background: #2b77c4; }
  .action-btns .btn-order { background: var(--c-green); color: #fff; border-color: var(--c-green); }
  .action-btns .btn-order:hover { background: #2f8a5a; }
  .action-btns .btn-schedule { background: var(--c-orange); color: #fff; border-color: var(--c-orange); }
  .action-btns .btn-schedule:hover { background: #c05e1a; }

  /* Modal overlay */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: var(--radius); padding: 24px; width: 100%; max-width: 440px; }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal label { display: block; font-size: 13px; color: var(--c-muted); margin-bottom: 4px; }
  .modal input, .modal select, .modal textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--c-border); border-radius: 6px; font-size: 14px; font-family: inherit; margin-bottom: 12px; }
  .modal textarea { resize: vertical; min-height: 70px; }
  .modal .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .modal .modal-footer button { padding: 8px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .modal .modal-footer .btn-cancel { border: 1px solid var(--c-border); background: #fff; }
  .modal .modal-footer .btn-save { background: var(--c-blue); color: #fff; border: none; }
  .modal .modal-footer .btn-save:hover { background: #2b77c4; }

  /* Timeline */
  .section { background: var(--c-card); border: 1px solid var(--c-border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
  .section h3 { font-size: 13px; font-weight: 700; color: var(--c-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .tl-item { display: flex; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--c-border); }
  .tl-item:last-child { border-bottom: none; }
  .tl-dot { width: 28px; flex-shrink: 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 4px; }
  .tl-dot span { width: 10px; height: 10px; border-radius: 50%; display: block; }
  .dot-kunjungan    { background: var(--c-blue); }
  .dot-telepon      { background: #805ad5; }
  .dot-received_order { background: var(--c-green); }
  .dot-note         { background: var(--c-muted); }
  .tl-body { flex: 1; }
  .tl-body .tl-who  { font-size: 13px; font-weight: 600; }
  .tl-body .tl-type { font-size: 12px; color: var(--c-muted); }
  .tl-body .tl-notes { font-size: 13px; color: #4a5568; margin-top: 3px; }
  .tl-body .tl-inv   { font-size: 12px; background: var(--c-green-bg); color: var(--c-green); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 3px; }
  .tl-time { font-size: 11px; color: var(--c-muted); white-space: nowrap; padding-top: 3px; }

  /* Scheduled section */
  .sched-item { display: flex; align-items: flex-start; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--c-border); }
  .sched-item:last-child { border-bottom: none; }
  .sched-item .si-info { flex: 1; }
  .sched-item .si-type { font-size: 13px; font-weight: 600; }
  .sched-item .si-meta { font-size: 12px; color: var(--c-muted); }
  .sched-item .si-notes { font-size: 12px; color: #4a5568; margin-top: 2px; }
  .sched-item .done-btn { font-size: 11px; padding: 3px 10px; border: 1px solid var(--c-green); color: var(--c-green); background: none; border-radius: 12px; cursor: pointer; white-space: nowrap; }
  .sched-item .done-btn:hover { background: var(--c-green-bg); }

  .empty-state { text-align: center; padding: 24px; color: var(--c-muted); font-size: 13px; }
  .error-msg { color: var(--c-red); font-size: 13px; padding: 4px 0; }
</style>
</head>
<body>

<nav>
  <a class="brand" href="/">Kencana</a>
  <a href="/visits">Catat</a>
  <a href="/visits-rack">Rack-up</a>
  <a href="/myday">My Day</a>
  <a href="/visits-insights">Insights</a>
  <div class="spacer"></div>
  <a class="back-btn" href="javascript:history.back()">← Kembali</a>
</nav>

<div class="page" id="page">
  <div class="empty-state">Memuat akun…</div>
</div>

<!-- Action modal -->
<div class="overlay" id="action-overlay">
  <div class="modal">
    <h3 id="modal-title">Catat Aktivitas</h3>
    <label>Sales rep</label>
    <select id="m-rep"><option value="">— Pilih —</option></select>
    <div id="m-invoice-wrap">
      <label>Nomor Invoice <span style="color:#e53e3e">*</span></label>
      <input type="text" id="m-invoice" placeholder="INV-2025-001">
    </div>
    <label>Catatan</label>
    <textarea id="m-notes" placeholder="Catatan (opsional)"></textarea>
    <div class="error-msg" id="m-err"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-save" id="m-save-btn" onclick="saveAction()">Simpan</button>
    </div>
  </div>
</div>

<!-- Schedule modal -->
<div class="overlay" id="sched-overlay">
  <div class="modal">
    <h3>Jadwalkan Follow-up</h3>
    <label>Sales rep</label>
    <select id="s-rep"><option value="">— Pilih —</option></select>
    <label>Jenis aktivitas</label>
    <select id="s-type">
      <option value="followup">Follow-up</option>
      <option value="kunjungan">Kunjungan</option>
      <option value="telepon">Telepon</option>
    </select>
    <label>Waktu <span style="color:#e53e3e">*</span></label>
    <input type="datetime-local" id="s-when">
    <label>Catatan</label>
    <textarea id="s-notes" placeholder="Catatan (opsional)"></textarea>
    <div class="error-msg" id="s-err"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeScheduleModal()">Batal</button>
      <button class="btn-save" onclick="saveSchedule()">Simpan</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const qs = s => document.querySelector(s);

const params = new URLSearchParams(location.search);
const ACCT_ID = Number(params.get('id'));

let currentAccount = null;
let pendingActionType = null;
let salespeople = [];

// ── Helpers ──────────────────────────────────────────────────────────────────

function stageBadge(stage) {
  const map = {
    aktif: ['badge-aktif','Aktif'],
    perlu_followup: ['badge-perlu','Perlu Follow-up'],
    at_risk: ['badge-at_risk','At Risk'],
    hibernasi: ['badge-hibernasi','Hibernasi'],
    prospek: ['badge-prospek','Prospek'],
    penawaran: ['badge-penawaran','Penawaran'],
    negosiasi: ['badge-negosiasi','Negosiasi'],
    won: ['badge-won','Won'],
    gugur: ['badge-gugur','Gugur'],
  };
  const [cls, label] = map[stage] ?? ['', stage ?? '—'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function fmtWib(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  const s = new Date(d.getTime() + 7*3600*1000);
  return `${s.getUTCDate().toString().padStart(2,'0')}/${(s.getUTCMonth()+1).toString().padStart(2,'0')}/${s.getUTCFullYear()} ${s.getUTCHours().toString().padStart(2,'0')}.${s.getUTCMinutes().toString().padStart(2,'0')}`;
}

function actionLabel(t) {
  return {kunjungan:'Kunjungan',telepon:'Telepon',received_order:'Terima Order',note:'Catatan',followup:'Follow-up'}[t] ?? t;
}

function dotClass(t) {
  return {kunjungan:'dot-kunjungan',telepon:'dot-telepon',received_order:'dot-received_order',note:'dot-note'}[t] ?? 'dot-note';
}

function stageOptionsFor(acctType) {
  if (acctType === 'project') {
    return ['prospek','penawaran','negosiasi','won','gugur'];
  }
  return ['aktif','perlu_followup','at_risk','hibernasi'];
}

function stageLabel(s) {
  return {aktif:'Aktif',perlu_followup:'Perlu Follow-up',at_risk:'At Risk',hibernasi:'Hibernasi',prospek:'Prospek',penawaran:'Penawaran',negosiasi:'Negosiasi',won:'Won',gugur:'Gugur'}[s] ?? s;
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderPage(data) {
  const { account, actions, stage_history, scheduled } = data;
  currentAccount = account;

  const stages = stageOptionsFor(account.account_type);

  const stageOpts = stages.map(s =>
    `<option value="${s}" ${s === account.stage ? 'selected' : ''}>${stageLabel(s)}</option>`
  ).join('');

  const typeLabel = account.account_type === 'project' ? 'Project' : 'Repeating';

  const page = $('page');
  page.innerHTML = `
    <div class="acct-header">
      <div class="row">
        <div style="flex:1">
          <div class="name">${account.store_name}</div>
          <div class="meta">
            <span>${account.area ?? '—'}</span>
            <span>${account.category ?? '—'}</span>
            <span>Tipe: <strong>${typeLabel}</strong></span>
            ${account.owner_name ? `<span>Owner: ${account.owner_name} (${account.owner_code ?? '—'})</span>` : ''}
          </div>
          <div class="meta" style="margin-top:4px">
            <span>Pertama dicatat: ${fmtWib(account.first_seen_at)}</span>
            <span>Terakhir kontak: ${fmtWib(account.last_contact_at)}</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${stageBadge(account.stage)}
        </div>
      </div>
      <div class="stage-area">
        <label>Ubah stage:</label>
        <select id="stage-sel">${stageOpts}</select>
        <select id="stage-rep">
          <option value="">— Pilih rep —</option>
          ${salespeople.map(sp => `<option value="${sp.id}">${sp.full_name}</option>`).join('')}
        </select>
        <button onclick="changeStage()">Terapkan</button>
        <span class="changed-by" id="stage-msg"></span>
      </div>
    </div>

    <div class="action-bar">
      <h3>Catat Aktivitas</h3>
      <div class="action-btns">
        <button class="btn-primary" onclick="openAction('kunjungan')">+ Kunjungan</button>
        <button onclick="openAction('telepon')">📞 Telepon</button>
        <button class="btn-order" onclick="openAction('received_order')">📦 Terima Order</button>
        <button onclick="openAction('note')">📝 Catatan</button>
        <button class="btn-schedule" onclick="openSchedule()">📅 Jadwal Follow-up</button>
      </div>
    </div>

    ${renderScheduled(scheduled)}

    <div class="section">
      <h3>Timeline Aktivitas <span style="font-weight:400;color:#a0aec0">(${actions.length})</span></h3>
      <div class="timeline" id="timeline">
        ${actions.length === 0 ? '<div class="empty-state">Belum ada aktivitas.</div>' :
          actions.map(a => `
            <div class="tl-item">
              <div class="tl-dot"><span class="${dotClass(a.action_type)}"></span></div>
              <div class="tl-body">
                <div class="tl-who">${a.salesperson_name ?? '—'} <span class="tl-type">· ${actionLabel(a.action_type)}</span></div>
                ${a.notes ? `<div class="tl-notes">${a.notes}</div>` : ''}
                ${a.invoice_number ? `<div class="tl-inv">Invoice: ${a.invoice_number}</div>` : ''}
              </div>
              <div class="tl-time">${fmtWib(a.actioned_at)}</div>
            </div>
          `).join('')}
      </div>
    </div>

    <div class="section">
      <h3>Riwayat Stage</h3>
      ${stage_history.length === 0 ? '<div class="empty-state">Belum ada perubahan stage.</div>' :
        stage_history.map(h => `
          <div class="tl-item">
            <div class="tl-dot"><span style="background:#805ad5" class=""></span></div>
            <div class="tl-body">
              <div class="tl-who">${h.changed_by_name ?? 'Sistem'}</div>
              <div class="tl-type">${stageBadge(h.old_stage ?? '—')} → ${stageBadge(h.new_stage)}</div>
            </div>
            <div class="tl-time">${fmtWib(h.changed_at)}</div>
          </div>
        `).join('')}
    </div>
  `;

  // Populate rep dropdowns in modals
  populateRepDropdowns();
}

function renderScheduled(scheduled) {
  if (!scheduled || scheduled.length === 0) return '';
  return `
    <div class="section">
      <h3>Follow-up Terjadwal <span style="font-weight:400;color:#a0aec0">(${scheduled.length})</span></h3>
      ${scheduled.map(sa => `
        <div class="sched-item">
          <div class="si-info">
            <div class="si-type">${actionLabel(sa.action_type)}</div>
            <div class="si-meta">${fmtWib(sa.scheduled_for)} WIB · ${sa.salesperson_name ?? '—'}</div>
            ${sa.notes ? `<div class="si-notes">${sa.notes}</div>` : ''}
          </div>
          <button class="done-btn" onclick="markDone(${sa.id})">✓ Selesai</button>
        </div>
      `).join('')}
    </div>
  `;
}

// ── Stage change ──────────────────────────────────────────────────────────────

async function changeStage() {
  const stage = $('stage-sel').value;
  const repId = $('stage-rep').value || null;
  const msg = $('stage-msg');
  msg.textContent = '';
  try {
    const r = await fetch(`/api/accounts/${ACCT_ID}/stage`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stage, changed_by: repId ? Number(repId) : null }),
    });
    const d = await r.json();
    if (!r.ok) { msg.style.color = '#e53e3e'; msg.textContent = d.error; return; }
    msg.style.color = '#38a169'; msg.textContent = 'Stage diperbarui ✓';
    await load();
  } catch (err) {
    msg.style.color = '#e53e3e'; msg.textContent = err.message;
  }
}

// ── Action modal ──────────────────────────────────────────────────────────────

function openAction(type) {
  pendingActionType = type;
  $('modal-title').textContent = { kunjungan:'Catat Kunjungan', telepon:'Catat Telepon', received_order:'Catat Terima Order', note:'Tambah Catatan' }[type] ?? 'Catat Aktivitas';
  $('m-invoice-wrap').style.display = type === 'received_order' ? 'block' : 'none';
  $('m-invoice').value = '';
  $('m-notes').value = '';
  $('m-err').textContent = '';
  $('action-overlay').classList.add('open');
}

function closeModal() {
  $('action-overlay').classList.remove('open');
  pendingActionType = null;
}

async function saveAction() {
  const rep_id        = $('m-rep').value;
  const invoice_number = $('m-invoice').value.trim();
  const notes         = $('m-notes').value.trim();
  $('m-err').textContent = '';

  if (pendingActionType === 'received_order' && !invoice_number) {
    $('m-err').textContent = 'Nomor invoice wajib diisi untuk Terima Order.';
    return;
  }

  const body = { action_type: pendingActionType, salesperson_id: rep_id ? Number(rep_id) : null, notes: notes || null };
  if (pendingActionType === 'received_order') body.invoice_number = invoice_number;

  try {
    const r = await fetch(`/api/accounts/${ACCT_ID}/actions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok) { $('m-err').textContent = d.error; return; }
    closeModal();
    await load();
  } catch (err) {
    $('m-err').textContent = err.message;
  }
}

// ── Schedule modal ────────────────────────────────────────────────────────────

function openSchedule() {
  $('s-notes').value = '';
  $('s-err').textContent = '';
  // Default to tomorrow 09:00 WIB
  const tomorrow = new Date(Date.now() + 24*3600*1000 + 7*3600*1000);
  tomorrow.setUTCHours(2, 0, 0, 0); // 09:00 WIB = 02:00 UTC
  const wibStr = new Date(tomorrow.getTime() - 7*3600*1000 + 7*3600*1000);
  const pad = n => n.toString().padStart(2,'0');
  $('s-when').value = `${wibStr.getFullYear()}-${pad(wibStr.getMonth()+1)}-${pad(wibStr.getDate())}T09:00`;
  $('sched-overlay').classList.add('open');
}

function closeScheduleModal() {
  $('sched-overlay').classList.remove('open');
}

async function saveSchedule() {
  const rep_id      = $('s-rep').value;
  const action_type = $('s-type').value;
  const when        = $('s-when').value;
  const notes       = $('s-notes').value.trim();
  $('s-err').textContent = '';

  if (!when) { $('s-err').textContent = 'Pilih waktu jadwal.'; return; }

  // Convert from WIB datetime-local input to UTC ISO
  const localDate = new Date(when);
  const wibOffsetMs = 7 * 3600 * 1000;
  const utcDate = new Date(localDate.getTime() - wibOffsetMs);

  try {
    const r = await fetch(`/api/accounts/${ACCT_ID}/schedule`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        salesperson_id: rep_id ? Number(rep_id) : null,
        action_type,
        scheduled_for: utcDate.toISOString(),
        notes: notes || null,
      }),
    });
    const d = await r.json();
    if (!r.ok) { $('s-err').textContent = d.error; return; }
    closeScheduleModal();
    await load();
  } catch (err) {
    $('s-err').textContent = err.message;
  }
}

// ── Mark done ─────────────────────────────────────────────────────────────────

async function markDone(sid) {
  await fetch(`/api/scheduled/${sid}/done`, { method: 'PATCH' });
  await load();
}

// ── Populate reps ─────────────────────────────────────────────────────────────

function populateRepDropdowns() {
  for (const selId of ['m-rep','s-rep']) {
    const sel = $(selId);
    if (!sel) continue;
    sel.innerHTML = '<option value="">— Pilih rep —</option>';
    for (const sp of salespeople) {
      const o = document.createElement('option');
      o.value = sp.id; o.textContent = `${sp.full_name} (${sp.code ?? '—'})`;
      sel.appendChild(o);
    }
  }
}

// ── Data ──────────────────────────────────────────────────────────────────────

async function load() {
  if (!ACCT_ID) {
    $('page').innerHTML = '<div class="empty-state" style="color:#e53e3e">ID akun tidak ditemukan di URL.</div>';
    return;
  }
  try {
    const r = await fetch(`/api/accounts/${ACCT_ID}`);
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      $('page').innerHTML = `<div class="empty-state" style="color:#e53e3e">Error: ${d.error ?? r.statusText}</div>`;
      return;
    }
    const data = await r.json();
    renderPage(data);
  } catch (err) {
    $('page').innerHTML = `<div class="empty-state" style="color:#e53e3e">Gagal memuat: ${err.message}</div>`;
  }
}

async function loadReps() {
  try {
    const r = await fetch('/api/salespeople');
    const d = await r.json();
    salespeople = d.salespeople ?? [];
  } catch {}
}

// ── Boot ──────────────────────────────────────────────────────────────────────

loadReps().then(load);
</script>
</body>
